name: Generate Plugin Release

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract Version from index.php
        id: get_version
        run: |
          # Cerca la riga "Version:", prende il numero e pulisce gli spazi
          VERSION=$(grep "Version:" index.php | cut -d ':' -f 2 | xargs)
          echo "plugin_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Prepare Plugin Directory
        run: |
          mkdir sgaia-gen-articoli
          cp index.php sgaia-gen-articoli/

      - name: Create Zip Archive
        run: zip -r sgaia-gen-articoli.zip sgaia-gen-articoli

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.plugin_version }}
          name: Release ${{ steps.get_version.outputs.plugin_version }}
          # Aggiungiamo un corpo del messaggio per l'utente
          body: |
            ### 🚀 Installazione
            Scarica il file **sgaia-gen-articoli.zip** qui sotto e caricalo su WordPress.
            *Non utilizzare i file 'Source code' per l'installazione diretta.*
          files: sgaia-gen-articoli.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}